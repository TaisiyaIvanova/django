{% extends 'base.html' %}
{% block content %}

<div class="auth-container">
    <h2>Вход в аккаунт</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.username.label_tag }}
        {{ form.username }}

        {{ form.password.label_tag }}
        {{ form.password }}

        <button class="auth-btn" type="submit">Войти</button>
    </form>

    <div class="auth-bottom">
        Нет аккаунта?
        <a href="{% url 'register' %}">Создать</a>
    </div>
</div>

{% endblock %}
