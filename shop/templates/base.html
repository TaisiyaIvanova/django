<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sushi Shop{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/auth.css">
    <link rel="stylesheet" href="/static/css/info.css">


    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fafafa;
        }
        header {
            background: #000000;
            padding: 15px 0;
        }
        nav {
            width: 90%;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            font-size: 18px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            width: 90%;
            margin: 30px auto;
        }
        h1 {
            color: #333;
        }
        .hero {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #000000;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 18px;
        }
        .btn:hover {
            background: #423232;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="/">Главная</a>
        <a href="/catalog/">Каталог</a>
        <a href="/about/">О нас</a>
        <a href="/delivery/">Доставка</a>
        <a href="/contacts/">Контакты</a>
        <a href="/cart/">Корзина</a>

    {% if user.is_authenticated %}
    <a href="{% url 'profile' %}">Личный кабинет</a>
    <a href="{% url 'logout' %}">Выйти</a>
{% else %}
    <a href="{% url 'login' %}">Войти</a>
    <a href="{% url 'register' %}">Регистрация</a>
{% endif %}

    </nav>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
