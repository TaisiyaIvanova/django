{% extends 'base.html' %}

{% block title %}Каталог — Sushi Shop{% endblock %}

{% block content %}
<h1 style="margin-bottom: 20px;">Каталог</h1>
<style>
.filter-bar {
    background: #000;
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 30px;
    display: flex;
    gap: 20px;
    align-items: center;
    color: white;
}

.filter-bar input,
.filter-bar select {
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

.filter-bar button {
    background: #ff4d4d;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 15px;
}
</style>

<div class="filter-bar">
    <form method="GET" style="display:flex; gap:20px; width:100%;">
        <input type="text" name="q" placeholder="Поиск по товарам..."
               value="{{ request.GET.q }}">

        <select name="sort">
            <option value="">Сортировка</option>
            <option value="price_asc" {% if request.GET.sort == 'price_asc' %}selected{% endif %}>Цена ↑</option>
            <option value="price_desc" {% if request.GET.sort == 'price_desc' %}selected{% endif %}>Цена ↓</option>
            <option value="name_asc" {% if request.GET.sort == 'name_asc' %}selected{% endif %}>Название A–Я</option>
            <option value="name_desc" {% if request.GET.sort == 'name_desc' %}selected{% endif %}>Название Я–А</option>
        </select>

        <button type="submit">Применить</button>
    </form>
</div>

<div style="
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 25px;
">
    {% for product in products %}
    <div style="
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        text-align: center;
    ">
        <img src="{{ product.image.url }}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 10px;">

        <h3 style="margin: 10px 0;">{{ product.name }}</h3>

        <p style="font-size: 18px; font-weight: bold; margin: 5px 0;">
            {{ product.price }} BYN
        </p>

        <a href="/product/{{ product.slug }}/"
           style="
               display: inline-block;
               padding: 10px 15px;
               background: #000000;
               color: white;
               border-radius: 6px;
               text-decoration: none;
               font-weight: bold;
           ">
            Подробнее
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
